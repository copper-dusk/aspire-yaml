<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .arrow { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .label { font-weight: 600; }
    .detail { font-size: 11px; opacity: 0.75; }
    text { fill: currentColor; }
  </style>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor" />
    </marker>
  </defs>

  <rect class="box" x="240" y="20" width="240" height="60" rx="6"/>
  <text x="360" y="44" text-anchor="middle" class="label">YAML source tree</text>
  <text x="360" y="64" text-anchor="middle" class="detail">authored once in the AppHost</text>

  <path class="arrow" d="M360 80 L360 110 L180 110 L180 140"/>
  <path class="arrow" d="M360 80 L360 110 L540 110 L540 140"/>

  <rect class="box" x="40" y="140" width="280" height="130" rx="6"/>
  <text x="180" y="164" text-anchor="middle" class="label">Host pass</text>
  <text x="180" y="190" text-anchor="middle" class="detail">.Host → EndpointProperty.Host (proxied)</text>
  <text x="180" y="210" text-anchor="middle" class="detail">.Port → EndpointProperty.Port (proxied)</text>
  <text x="180" y="232" text-anchor="middle" class="detail">PerspectiveValue picks the host branch</text>
  <text x="180" y="252" text-anchor="middle" class="detail">YamlSourceResource → HostOutputPath</text>

  <rect class="box" x="400" y="140" width="280" height="130" rx="6"/>
  <text x="540" y="164" text-anchor="middle" class="label">Container pass</text>
  <text x="540" y="190" text-anchor="middle" class="detail">.Host → resource name (DNS)</text>
  <text x="540" y="210" text-anchor="middle" class="detail">.Port → EndpointProperty.TargetPort</text>
  <text x="540" y="232" text-anchor="middle" class="detail">PerspectiveValue picks the container branch</text>
  <text x="540" y="252" text-anchor="middle" class="detail">YamlSourceResource → ContainerOutputPath</text>

  <path class="arrow" d="M180 272 L180 310"/>
  <path class="arrow" d="M540 272 L540 310"/>

  <rect class="box" x="60" y="310" width="240" height="50" rx="6"/>
  <text x="180" y="330" text-anchor="middle" class="label">&lt;id&gt;.host.yaml</text>
  <text x="180" y="348" text-anchor="middle" class="detail">on-disk, host-perspective rendering</text>

  <rect class="box" x="420" y="310" width="240" height="50" rx="6"/>
  <text x="540" y="330" text-anchor="middle" class="label">&lt;id&gt;.container.yaml</text>
  <text x="540" y="348" text-anchor="middle" class="detail">on-disk, container-perspective rendering</text>

  <path class="arrow" d="M180 362 L180 400"/>
  <path class="arrow" d="M540 362 L540 400"/>

  <rect class="box" x="40" y="400" width="280" height="120" rx="6"/>
  <text x="180" y="424" text-anchor="middle" class="label">Host-side consumer</text>
  <text x="180" y="448" text-anchor="middle" class="detail">Dapr sidecar, exec, or any</text>
  <text x="180" y="464" text-anchor="middle" class="detail">process running on the developer's box</text>
  <text x="180" y="486" text-anchor="middle" class="detail">reads HostOutputPath / HostPath</text>

  <rect class="box" x="400" y="400" width="280" height="120" rx="6"/>
  <text x="540" y="424" text-anchor="middle" class="label">Container consumer</text>
  <text x="540" y="448" text-anchor="middle" class="detail">WithYamlBindMount mounts the</text>
  <text x="540" y="464" text-anchor="middle" class="detail">container rendering into the target</text>
  <text x="540" y="486" text-anchor="middle" class="detail">container at the requested path</text>
</svg>
